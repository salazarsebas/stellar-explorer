services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "54320:5432"
    environment:
      POSTGRES_DB: stellar_explorer
      POSTGRES_USER: explorer
      POSTGRES_PASSWORD: explorer_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U explorer -d stellar_explorer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:27.1
    ports:
      - "18108:8108"
    environment:
      TYPESENSE_API_KEY: explorer_dev_key
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_data:/data

volumes:
  postgres_data:
  redis_data:
  typesense_data:
