name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - "apps/explorer-web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "apps/explorer-web/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/ci.yml"

jobs:
  ci:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify translation files have equal keys
        run: |
          echo "Counting keys in translation files..."
          counts=""
          for f in apps/explorer-web/messages/*.json; do
            count=$(cat "$f" | jq '[.. | scalars] | length')
            echo "$(basename $f): $count keys"
            counts="$counts$count\n"
          done

          unique_counts=$(echo -e "$counts" | sort -u | grep -v '^$' | wc -l)
          if [ "$unique_counts" -ne 1 ]; then
            echo "❌ Error: Translation files have different key counts!"
            exit 1
          else
            echo "✅ All translation files have the same number of keys"
          fi

      - name: Build
        run: bun run build:web

      - name: Check formatting
        run: bun run format:check:web

      - name: Lint
        run: bun run lint:web

      - name: Audit
        run: >
          bun audit
          --ignore GHSA-3p68-rc4w-qgx5
          --ignore GHSA-fvcv-3m26-pcqx
          --ignore GHSA-r4q5-vmmm-2653
          --ignore GHSA-4w7w-66w2-5vf9
          --ignore GHSA-v2wj-q39q-566r
          --ignore GHSA-p9ff-h696-f583
          --ignore GHSA-48c2-rrv3-qjmp

      - name: Check outdated dependencies
        run: bun outdated || true
