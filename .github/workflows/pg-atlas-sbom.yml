name: PG Atlas SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  submit-sbom:
    name: Submit SBOM to PG Atlas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Submit repository SBOM
        uses: SCF-Public-Goods-Maintenance/pg-atlas-sbom-action@f2f44ed8cec916dd412c86ebcab796655656329f
